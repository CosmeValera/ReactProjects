<section>
  @if (isLoggedIn()) {
    <p>Bienvenido, {{ username }}</p>
    <img
      (dblclick)="greet()"
      alt="photo"
      src="https://github.com/CosmeValera.png" />
  } @else {
    <button (click)="isLoggedIn.set(true)">¡Iniciá sesión!</button>
  }
  <app-games
    (addFavoriteEvent)="getFavorite($event)"
    username="{{ username }}"
  />
  @if (favGame !== '') {
    <p>Tu juego favorito es: {{favGame}}</p>
  }
</section>
